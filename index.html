<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Figurinhas - Copa do Mundo</title>
    <style>
        :root {
            --bg-dark: #121f28;
            --bg-card: #1e2f3d;
            --primary: #c29d59; /* Gold */
            --primary-hover: #e0b86a;
            --text-light: #f4f4f4;
            --common: #809baf;
            --rare: #9b59b6;
            --legendary: #f1c40f;
            --danger: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0f181f, #1a2a35);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background-color: var(--primary);
            color: #111;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(194, 157, 89, 0.4);
        }

        button.btn-danger {
            background-color: var(--danger);
            color: white;
        }

        button.btn-danger:hover {
            background-color: #ff6b6b;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
        }

        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 15px;
            height: 25px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(194, 157, 89, 0.3);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #967117, var(--primary));
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .tab {
            font-size: 1.2rem;
            color: var(--text-light);
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 3px solid var(--primary);
            color: var(--primary);
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* PACK SECTION */
        .pack-area {
            text-align: center;
            padding: 50px 20px;
        }

        .pack-img {
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, #870000, #520000);
            border: 4px solid var(--primary);
            border-radius: 15px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pack-img::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: rotate(45deg) translateY(-100%); }
            100% { transform: rotate(45deg) translateY(100%); }
        }

        .pack-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .opened-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            min-height: 350px;
        }

        /* CARD STYLES */
        .card-scene {
            width: 180px;
            height: 250px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .card-back {
            background: repeating-linear-gradient(
                45deg,
                #1a2a35,
                #1a2a35 10px,
                #121f28 10px,
                #121f28 20px
            );
            border: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2rem;
        }

        .card-front {
            background-color: var(--bg-card);
            transform: rotateY(180deg);
            border: 3px solid;
            position: relative;
        }

        .card-front[data-rarity="Comum"] { border-color: var(--common); }
        .card-front[data-rarity="Rara"] { 
            border-color: var(--rare); 
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.5);
        }
        .card-front[data-rarity="Lendária"] { 
            border-color: var(--legendary);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.8);
            background: linear-gradient(135deg, var(--bg-card), #3d3014);
        }

        .card-header {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-image {
            flex: 1;
            background-color: #2a4054;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-image i {
            font-size: 4rem;
            color: rgba(255,255,255,0.1);
        }

        .card-front[data-rarity="Lendária"] .card-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(241, 196, 15, 0.2), transparent);
        }

        .card-footer {
            padding: 10px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .card-rarity {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .card-front[data-rarity="Comum"] .card-rarity { background: var(--common); color: #fff; }
        .card-front[data-rarity="Rara"] .card-rarity { background: var(--rare); color: #fff; }
        .card-front[data-rarity="Lendária"] .card-rarity { background: var(--legendary); color: #000; }

        .duplicate-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: var(--danger);
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* ALBUM SECTION */
        .team-section {
            margin-bottom: 40px;
            background: rgba(30, 47, 61, 0.5);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .team-flag {
            width: 40px;
            height: 30px;
            border-radius: 4px;
            background-color: #fff;
            display: inline-block;
        }

        .team-title {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .team-progress {
            margin-left: auto;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .sticker-slot {
            aspect-ratio: 2.5 / 3.5;
            background: rgba(0,0,0,0.2);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.2);
            font-weight: bold;
            position: relative;
        }

        .sticker-slot.filled {
            border: none;
            background: none;
        }

        .sticker-slot .card-scene {
            width: 100%;
            height: 100%;
            margin: 0;
            cursor: default;
        }

        .sticker-slot .card-scene .card {
            transform: none; /* Always face up in album */
        }

        .sticker-slot .card-front {
            transform: none;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .controls {
                justify-content: center;
            }
            .stickers-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Copa do Mundo</h1>
            <div class="controls">
                <button onclick="copySource()">Copiar Código</button>
                <button class="btn-danger" onclick="resetAlbum()">Resetar Álbum</button>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0 / 0 (0%)</div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('album')">Meu Álbum</button>
        <button class="tab" onclick="switchTab('packs')">Abrir Pacotes</button>
    </div>

    <main>
        <!-- ALBUM SECTION -->
        <section id="album" class="section active">
            <div id="albumContainer"></div>
        </section>

        <!-- PACKS SECTION -->
        <section id="packs" class="section">
            <div class="pack-area">
                <h2 style="margin-bottom: 20px; color: var(--primary);">Toque no pacote para abrir!</h2>
                <div class="pack-img" onclick="openPack()">
                    FIFA 2026<br>PACK
                </div>
                
                <div class="opened-cards" id="openedCardsContainer">
                    <!-- Cards will be injected here -->
                </div>
                
                <button id="btnStoreCards" style="display: none; margin: 30px auto 0;" onclick="storeCards()">Colar no Álbum</button>
            </div>
        </section>
    </main>

    <script>
        // Data Structure
        const teams = [
            { id: 'BRA', name: 'Brasil', color: '#009b3a' },
            { id: 'ARG', name: 'Argentina', color: '#43a1d5' },
            { id: 'FRA', name: 'França', color: '#002654' },
            { id: 'GER', name: 'Alemanha', color: '#dd0000' },
            { id: 'ENG', name: 'Inglaterra', color: '#ffffff' },
            { id: 'ESP', name: 'Espanha', color: '#c60b1e' }
        ];

        const rarities = ['Comum', 'Rara', 'Lendária'];
        const stickersDB = [];
        const STICKERS_PER_TEAM = 11;
        let inventory = {}; // { stickerId: count }
        let currentPack = [];

        // Initialization
        function init() {
            generateStickersDB();
            loadProgress();
            renderAlbum();
            updateProgressUI();
        }

        // Generate Database
        function generateStickersDB() {
            teams.forEach(team => {
                for(let i = 1; i <= STICKERS_PER_TEAM; i++) {
                    // Define Rarity based on math to have fixed rarities for specific numbers
                    let rarity = 'Comum';
                    if (i === 10) rarity = 'Lendária'; // Number 10 is always legendary
                    else if (i === 1 || i === 9) rarity = 'Rara'; // Goalie and Striker

                    stickersDB.push({
                        id: `${team.id}-${i}`,
                        teamId: team.id,
                        teamName: team.name,
                        num: i,
                        name: `Jogador ${i}`,
                        rarity: rarity
                    });
                }
            });
        }

        // Local Storage
        function loadProgress() {
            const saved = localStorage.getItem('worldCupAlbum');
            if (saved) {
                inventory = JSON.parse(saved);
            } else {
                inventory = {};
            }
        }

        function saveProgress() {
            localStorage.setItem('worldCupAlbum', JSON.stringify(inventory));
        }

        function resetAlbum() {
            if(confirm("Tem certeza que deseja apagar todo o seu progresso?")) {
                inventory = {};
                saveProgress();
                renderAlbum();
                updateProgressUI();
                document.getElementById('openedCardsContainer').innerHTML = '';
                document.getElementById('btnStoreCards').style.display = 'none';
                alert("Álbum resetado com sucesso!");
            }
        }

        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if(tabId === 'album') {
                renderAlbum();
            }
        }

        // Pack Logic
        function getRandomSticker() {
            const rand = Math.random();
            let targetRarity = 'Comum';
            
            if (rand > 0.95) targetRarity = 'Lendária'; // 5% chance
            else if (rand > 0.80) targetRarity = 'Rara'; // 15% chance
            
            const pool = stickersDB.filter(s => s.rarity === targetRarity);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function openPack() {
            const container = document.getElementById('openedCardsContainer');
            container.innerHTML = '';
            currentPack = [];
            document.getElementById('btnStoreCards').style.display = 'none';

            // Generate 5 stickers
            for(let i=0; i<5; i++) {
                currentPack.push(getRandomSticker());
            }

            // Render cards face down
            currentPack.forEach((sticker, index) => {
                const isNew = !(inventory[sticker.id] > 0);
                
                const cardHTML = `
                    <div class="card-scene" style="animation: fadeIn 0.5s ${index * 0.1}s backwards;">
                        <div class="card" onclick="flipCard(this)">
                            <div class="card-face card-back">⚽</div>
                            <div class="card-face card-front" data-rarity="${sticker.rarity}">
                                ${!isNew ? '<div class="duplicate-badge">+1</div>' : ''}
                                <div class="card-header">${sticker.teamName}</div>
                                <div class="card-image">
                                    <div style="font-size: 3rem; opacity: 0.5;">👤</div>
                                </div>
                                <div class="card-footer">
                                    <span>#${sticker.id}</span>
                                    <span class="card-rarity">${sticker.rarity}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            document.getElementById('btnStoreCards').style.display = 'block';
        }

        function flipCard(cardElement) {
            cardElement.classList.toggle('is-flipped');
        }

        function storeCards() {
            currentPack.forEach(sticker => {
                if(inventory[sticker.id]) {
                    inventory[sticker.id]++;
                } else {
                    inventory[sticker.id] = 1;
                }
            });
            
            saveProgress();
            updateProgressUI();
            
            document.getElementById('openedCardsContainer').innerHTML = '<h3 style="color: var(--primary);">Figurinhas coladas com sucesso!</h3>';
            document.getElementById('btnStoreCards').style.display = 'none';
        }

        // Render Album
        function renderAlbum() {
            const container = document.getElementById('albumContainer');
            container.innerHTML = '';

            teams.forEach(team => {
                const teamStickers = stickersDB.filter(s => s.teamId === team.id);
                const collectedTeam = teamStickers.filter(s => inventory[s.id] > 0).length;
                
                let html = `
                    <div class="team-section">
                        <div class="team-header">
                            <div class="team-flag" style="background-color: ${team.color}; border: 1px solid #fff;"></div>
                            <h2 class="team-title">${team.name}</h2>
                            <div class="team-progress">${collectedTeam} / ${STICKERS_PER_TEAM}</div>
                        </div>
                        <div class="stickers-grid">
                `;

                teamStickers.forEach(sticker => {
                    const count = inventory[sticker.id] || 0;
                    
                    if (count > 0) {
                        html += `
                            <div class="sticker-slot filled">
                                <div class="card-scene">
                                    <div class="card is-flipped">
                                        <div class="card-face card-front" data-rarity="${sticker.rarity}">
                                            ${count > 1 ? `<div class="duplicate-badge">${count}</div>` : ''}
                                            <div class="card-header" style="font-size: 0.8rem">${sticker.name}</div>
                                            <div class="card-image" style="background: linear-gradient(to bottom, ${team.color}55, transparent)">
                                                <div style="font-size: 2.5rem; opacity: 0.8;">👤</div>
                                            </div>
                                            <div class="card-footer" style="padding: 5px;">
                                                <span>#${sticker.num}</span>
                                                <span class="card-rarity" style="font-size: 0.6rem">${sticker.rarity}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `<div class="sticker-slot">${sticker.num}</div>`;
                    }
                });

                html += `</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Progress
        function updateProgressUI() {
            const total = stickersDB.length;
            const uniqueCollected = Object.keys(inventory).length;
            const percentage = ((uniqueCollected / total) * 100).toFixed(1);
            
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').innerText = `${uniqueCollected} / ${total} (${percentage}%)`;
        }

        // Copy Source Code
        function copySource() {
            fetch(window.location.href)
            .then(res => res.text())
            .then(html => {
                navigator.clipboard.writeText(html).then(() => {
                    alert("Código fonte copiado com sucesso! Você pode colar no seu arquivo index.html.");
                });
            })
            .catch(() => {
                const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                navigator.clipboard.writeText(html).then(() => {
                    alert("Código fonte copiado com sucesso! Você pode colar no seu arquivo index.html.");
                });
            });
        }

        // Run
        init();
    </script>
</body>
</html>
