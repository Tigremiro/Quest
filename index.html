<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Álbum Digital - Copa 2026</title>
    <style>
        :root {
            --bg: #0f111a;
            --surface: #1e2130;
            --surface-glass: rgba(30, 33, 48, 0.7);
            --primary: #00ff88;
            --primary-dark: #00cc6a;
            --secondary: #ff0055;
            --text: #ffffff;
            --text-muted: #a0a5b5;
            --border: rgba(255, 255, 255, 0.1);
            --gold: #ffd700;
            --danger: #ff4444;
            --info: #00aaff;
            --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.8);
            --primary: #00cc6a;
            --primary-dark: #00aa55;
            --text: #1a1d24;
            --text-muted: #606575;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; transition: background 0.3s, color 0.3s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

        /* Background Particles */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.5; }

        /* Glassmorphism utility */
        .glass { background: var(--surface-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1d24 0%, #000000 100%);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #login-screen::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.03) 2px, rgba(0,255,136,0.03) 4px); pointer-events: none;
        }
        .login-box {
            padding: 2.5rem; border-radius: 24px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
            animation: float 6s ease-in-out infinite; z-index: 1;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .logo-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; background: linear-gradient(135deg, var(--primary), #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0,255,136,0.3)); }
        
        .input-group { position: relative; margin: 2rem 0; }
        .input-group input {
            width: 100%; padding: 1rem 1.5rem; border-radius: 12px; border: 2px solid var(--border); background: rgba(0,0,0,0.2);
            color: #fff; font-size: 1.2rem; text-align: center; letter-spacing: 5px; outline: none; transition: var(--transition);
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        
        .btn { padding: 1rem 2rem; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: var(--transition); text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); width: 100%; }
        .btn-primary:active { transform: scale(0.96); }
        .login-error { color: var(--danger); font-size: 0.9rem; margin-top: 10px; min-height: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; }

        /* --- APP PRINCIPAL --- */
        #app-screen { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 1; opacity: 0; transition: opacity 0.8s ease; }
        #app-screen.active { display: flex; opacity: 1; }

        /* Header */
        header { position: sticky; top: 0; z-index: 100; padding: 1rem; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .header-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--info)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-controls { display: flex; gap: 10px; }
        .icon-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .icon-btn:hover { background: var(--primary); color: #000; }

        /* Progress Bar */
        .progress-container { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 4px; position: relative; height: 28px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .progress-bar { background: linear-gradient(90deg, var(--secondary), var(--primary)); height: 100%; border-radius: 16px; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { left: 100%; } }
        .progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none; }

        /* Controls: Search & Filters */
        .controls-section { padding: 1rem; z-index: 90; position: sticky; top: 90px; }
        .search-box { position: relative; margin-bottom: 1rem; }
        .search-box input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem; outline: none; transition: var(--transition); }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .filters-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; -ms-overflow-style: none; }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.9rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: var(--transition); }
        .filter-chip.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Stats Panel */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .stat-card { background: var(--surface); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

        /* Main Grid */
        main { flex: 1; padding: 1rem; overflow-y: auto; scroll-behavior: smooth; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding-bottom: 80px; }

        /* Sticker Card */
        .sticker-card {
            background: linear-gradient(145deg, var(--surface), #151722); border: 1px solid var(--border); border-radius: 12px;
            aspect-ratio: 2.5 / 3.5; position: relative; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;
        }
        .sticker-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 2; }
        
        .card-header { padding: 8px; display: flex; justify-content: space-between; align-items: flex-start; background: rgba(0,0,0,0.2); }
        .sticker-num { font-weight: 900; font-size: 1rem; color: var(--text-muted); background: var(--bg); padding: 2px 6px; border-radius: 6px; }
        .sticker-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; background: rgba(255,255,255,0.1); }
        
        .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; text-align: center; }
        .sticker-icon { font-size: 2.5rem; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
        .sticker-name { font-size: 0.8rem; font-weight: 700; line-height: 1.1; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sticker-sub { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

        .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); }
        .action-btn { background: transparent; border: none; padding: 8px 0; font-size: 1rem; cursor: pointer; transition: var(--transition); position: relative; outline: none; }
        .action-btn:active { transform: scale(0.8); }
        .action-btn.active::before { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0.2; }
        .btn-have { color: var(--primary); }
        .btn-repeat { color: var(--info); }
        .btn-miss { color: var(--danger); }
        .action-btn.active { background: currentColor; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .action-btn.active.btn-have { color: var(--primary-dark); }
        
        /* Repeated Count Badge */
        .repeat-count { position: absolute; top: -5px; right: -5px; background: var(--info); color: #fff; width: 24px; height: 24px; border-radius: 50%; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; border: 2px solid var(--surface); display: none; }
        .repeat-count.show { display: flex; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* Status Visuals on Card */
        .sticker-card.status-have { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,136,0.1); }
        .sticker-card.status-have .sticker-num { color: var(--primary); }
        .sticker-card.status-missing { opacity: 0.7; filter: grayscale(0.8); }

        /* Special Stickers (Gold/Holo) */
        .sticker-card.special { border: 2px solid var(--gold); background: linear-gradient(135deg, #2a2200, #4d3a00); position: relative; }
        .sticker-card.special::after { content: ''; position: absolute; inset: 0; background: linear-gradient(125deg, transparent 20%, rgba(255,215,0,0.4) 40%, rgba(255,255,255,0.5) 50%, rgba(255,215,0,0.4) 60%, transparent 80%); background-size: 200% 200%; animation: holoGlow 4s linear infinite; pointer-events: none; mix-blend-mode: overlay; }
        @keyframes holoGlow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sticker-card.special .sticker-badge { background: var(--gold); color: #000; }
        
        /* Modal Export/Import */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--surface); padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-btn { display: block; width: 100%; margin-top: 10px; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .modal-btn.export { background: var(--info); color: #fff; }
        .modal-btn.import { background: var(--primary); color: #000; margin-top: 20px; }
        .modal-btn.danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 20px; }

        /* Confetti */
        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

        /* Fab to top */
        .fab-top { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: #000; border: none; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,255,136,0.4); cursor: pointer; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 90; }
        .fab-top.visible { opacity: 1; pointer-events: auto; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
            .search-box { max-width: 400px; }
        }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <canvas id="particles"></canvas>
    <canvas id="confetti-canvas"></canvas>

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="glass">
        <div class="login-box glass">
            <div class="logo-title">Copa 2026<br><span style="font-size: 1.2rem; color: var(--text); font-weight: 500;">Álbum Privado</span></div>
            <div class="input-group">
                <input type="password" id="pass-input" placeholder="SENHA" autocomplete="off" inputmode="numeric" maxlength="8">
                <div id="login-error" class="login-error">Senha incorreta</div>
            </div>
            <button class="btn btn-primary" id="btn-login">⚽ Entrar</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen">
        <header class="glass">
            <div class="header-top">
                <div class="header-title">COLEÇÃO 2026</div>
                <div class="header-controls">
                    <button class="icon-btn" id="btn-theme">🌓</button>
                    <button class="icon-btn" id="btn-menu">⚙️</button>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="prog-bar"></div>
                <div class="progress-text" id="prog-text">Calculando...</div>
            </div>
            
            <div class="stats-grid glass">
                <div class="stat-card">
                    <div class="stat-value" id="stat-have">0</div>
                    <div class="stat-label">Tenho</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-miss" style="color: var(--danger)">980</div>
                    <div class="stat-label">Faltam</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-rep" style="color: var(--info)">0</div>
                    <div class="stat-label">Repetidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-spec" style="color: var(--gold)">0</div>
                    <div class="stat-label">Especiais</div>
                </div>
            </div>
        </header>

        <section class="controls-section glass">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Buscar por número ou nome...">
            </div>
            <div class="filters-scroll" id="filters-container">
                <div class="filter-chip active" data-filter="all">Todas</div>
                <div class="filter-chip" data-filter="have">Tenho ✅</div>
                <div class="filter-chip" data-filter="missing">Faltam ❌</div>
                <div class="filter-chip" data-filter="repeat">Repetidas 🔁</div>
                <div class="filter-chip" data-filter="special">Especiais ✨</div>
                <div class="filter-chip" data-filter="common">Comuns 📄</div>
                <div class="filter-chip" data-filter="Símbolos">Símbolos 🏆</div>
                <div class="filter-chip" data-filter="Estádios">Estádios 🏟️</div>
                <div class="filter-chip" data-filter="Cidades">Cidades 🏙️</div>
                <div class="filter-chip" data-filter="Seleções">Seleções 🏳️</div>
            </div>
        </section>

        <main>
            <div class="grid" id="grid">
                <!-- Figurinhas renderizadas via JS -->
            </div>
        </main>
    </div>

    <button class="fab-top" id="fab-top">↑</button>

    <!-- Modal Config -->
    <div class="modal-overlay" id="modal-config">
        <div class="modal-content">
            <button class="modal-close" id="btn-close-modal">×</button>
            <h2 style="margin-bottom: 20px;">Configurações</h2>
            <button class="modal-btn export" id="btn-export">📥 Exportar Coleção (JSON)</button>
            <button class="modal-btn import" id="btn-import-trigger">📤 Importar Coleção</button>
            <input type="file" id="file-import" accept=".json" style="display: none;">
            <button class="modal-btn danger" id="btn-reset">⚠️ Resetar Álbum</button>
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border)">
                <button class="modal-btn" id="btn-copy-code" style="background: var(--surface); color: var(--text); border: 1px solid var(--border);">📋 Copiar Código-Fonte</button>
            </div>
        </div>
    </div>

<script>
    // --- REGRAS BÁSICAS ---
    const SENHA = "1234";
    const TOTAL_FIGURINHAS = 980;
    
    // Config de Som (Modo Criança)
    let audioCtx = null;
    const initAudio = () => { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }};
    const playPop = (type) => {
        try {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'have') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            } else if (type === 'rep') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            }
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(30);
        } catch(e){}
    };

    const playTada = () => {
        try {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
        } catch(e){}
    }

    // --- ESTADO & DADOS ---
    let collection = JSON.parse(localStorage.getItem('copa26_album')) || {};
    let stickersData = [];
    let currentFilter = 'all';
    let currentSearch = '';

    const teamsList = [
        "Brasil", "Argentina", "França", "Espanha", "Alemanha", "Inglaterra", "Portugal", "Itália", 
        "Holanda", "Croácia", "Uruguai", "Bélgica", "Colômbia", "EUA", "México", "Canadá", 
        "Japão", "Coreia do Sul", "Senegal", "Marrocos", "Camarões", "Gana", "Nigéria", "Argélia", 
        "Egito", "Arábia Saudita", "Irã", "Austrália", "Equador", "Peru", "Chile", "Suécia", 
        "Suíça", "Dinamarca", "Sérvia", "Polônia", "Gales", "Escócia", "Turquia", "Ucrânia", 
        "Áustria", "Rep. Tcheca", "Hungria", "Noruega", "Irlanda", "Nova Zelândia", "Costa Rica", "Panamá"
    ]; // 48 seleções

    // Gerador de Dados
    function generateData() {
        // 1 a 20: Símbolos (Especiais)
        for(let i=1; i<=20; i++) {
            stickersData.push({ num: String(i).padStart(3,'0'), nome: `Símbolo ${i}`, tipo: 'Especial', cat: 'Símbolos', icone: '🏆' });
        }
        // 21 a 50: Estádios (Comuns)
        for(let i=21; i<=50; i++) {
            stickersData.push({ num: String(i).padStart(3,'0'), nome: `Estádio ${i-20}`, tipo: 'Comum', cat: 'Estádios', icone: '🏟️' });
        }
        // 51 a 68: Cidades Sedes (Comuns)
        for(let i=51; i<=68; i++) {
            stickersData.push({ num: String(i).padStart(3,'0'), nome: `Cidade ${i-50}`, tipo: 'Comum', cat: 'Cidades', icone: '🏙️' });
        }
        // 69 a 980: Seleções (912 figurinhas -> 48 seleções x 19 figurinhas)
        // Cada seleção: 1 Escudo (Especial), 18 Jogadores (Comuns)
        let numId = 69;
        teamsList.forEach(team => {
            // Escudo
            stickersData.push({ num: String(numId++).padStart(3,'0'), nome: `Escudo ${team}`, tipo: 'Especial', cat: 'Seleções', sub: team, icone: '🛡️' });
            // Jogadores
            for(let j=1; j<=18; j++) {
                stickersData.push({ num: String(numId++).padStart(3,'0'), nome: `Jogador ${j}`, tipo: 'Comum', cat: 'Seleções', sub: team, icone: '🏃‍♂️' });
            }
        });
        // Totais: 20 Especiais + 48 Especiais (Escudos) = 68 Especiais. Resto Comum = 912. Total 980.
    }
    generateData();

    // --- DOM ELEMENTS ---
    const loginScreen = document.getElementById('login-screen');
    const appScreen = document.getElementById('app-screen');
    const passInput = document.getElementById('pass-input');
    const btnLogin = document.getElementById('btn-login');
    const loginError = document.getElementById('login-error');
    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search-input');
    const filterChips = document.querySelectorAll('.filter-chip');
    
    // Stats Elements
    const elProgBar = document.getElementById('prog-bar');
    const elProgText = document.getElementById('prog-text');
    const elStatHave = document.getElementById('stat-have');
    const elStatMiss = document.getElementById('stat-miss');
    const elStatRep = document.getElementById('stat-rep');
    const elStatSpec = document.getElementById('stat-spec');

    // --- LOGIN LOGIC ---
    function doLogin() {
        if(passInput.value === SENHA) {
            initAudio();
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                appScreen.classList.add('active');
                renderGrid();
                updateStats();
            }, 600);
        } else {
            loginError.style.opacity = '1';
            passInput.style.borderColor = 'var(--danger)';
            setTimeout(() => { loginError.style.opacity = '0'; passInput.style.borderColor = ''; }, 2000);
            if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
        }
    }
    btnLogin.addEventListener('click', doLogin);
    passInput.addEventListener('keypress', e => { if(e.key === 'Enter') doLogin(); });

    // --- CORE LOGIC ---
    function saveData() {
        localStorage.setItem('copa26_album', JSON.stringify(collection));
        updateStats();
    }

    function getStickerState(num) {
        return collection[num] || { status: 'missing', rep: 0 };
    }

    function toggleSticker(num, action) {
        initAudio();
        let state = getStickerState(num);
        if(action === 'have') {
            if(state.status !== 'have') { state.status = 'have'; playPop('have'); }
            else { state.status = 'missing'; playPop('miss'); }
            state.rep = 0;
        } else if (action === 'rep') {
            if(state.status === 'have' || state.status === 'missing') {
                state.status = 'have';
                state.rep++;
                playPop('rep');
            }
        } else if (action === 'miss') {
            state.status = 'missing';
            state.rep = 0;
            playPop('miss');
        }
        
        if(state.status === 'missing' && state.rep === 0) delete collection[num];
        else collection[num] = state;
        
        saveData();
        updateCardDOM(num, state);
        checkCompletion();
    }

    // --- RENDERIZAÇÃO ---
    function renderGrid() {
        let filtered = stickersData.filter(s => {
            const state = getStickerState(s.num);
            // Search
            const matchSearch = s.num.includes(currentSearch) || s.nome.toLowerCase().includes(currentSearch.toLowerCase()) || (s.sub && s.sub.toLowerCase().includes(currentSearch.toLowerCase()));
            if(!matchSearch) return false;
            
            // Filter
            if(currentFilter === 'all') return true;
            if(currentFilter === 'have') return state.status === 'have' && state.rep === 0;
            if(currentFilter === 'missing') return state.status === 'missing';
            if(currentFilter === 'repeat') return state.rep > 0;
            if(currentFilter === 'special') return s.tipo === 'Especial';
            if(currentFilter === 'common') return s.tipo === 'Comum';
            return s.cat === currentFilter || s.cat === currentFilter.replace('s', ''); // Handle Plurals simply
        });

        // Usando innerHTML massivo para performance rápida ao invés de appendChild unitário
        let html = '';
        filtered.forEach(s => {
            const state = getStickerState(s.num);
            const isSpec = s.tipo === 'Especial' ? 'special' : '';
            const statusClass = state.status === 'have' ? 'status-have' : 'status-missing';
            
            html += `
            <div class="sticker-card ${isSpec} ${statusClass}" data-num="${s.num}">
                <div class="repeat-count ${state.rep > 0 ? 'show' : ''}" id="badge-${s.num}">${state.rep}</div>
                <div class="card-header">
                    <span class="sticker-num">#${s.num}</span>
                    <span class="sticker-badge">${s.tipo === 'Especial' ? '✨' : '📄'}</span>
                </div>
                <div class="card-body">
                    <div class="sticker-icon">${s.icone}</div>
                    <div class="sticker-name">${s.nome}</div>
                    <div class="sticker-sub">${s.sub || s.cat}</div>
                </div>
                <div class="card-actions">
                    <button class="action-btn btn-have ${state.status === 'have' && state.rep === 0 ? 'active' : ''}" data-action="have" data-num="${s.num}">✅</button>
                    <button class="action-btn btn-repeat ${state.rep > 0 ? 'active' : ''}" data-action="rep" data-num="${s.num}">🔁</button>
                    <button class="action-btn btn-miss ${state.status === 'missing' ? 'active' : ''}" data-action="miss" data-num="${s.num}">❌</button>
                </div>
            </div>`;
        });
        grid.innerHTML = html;
    }

    function updateCardDOM(num, state) {
        const card = document.querySelector(`.sticker-card[data-num="${num}"]`);
        if(!card) return;
        
        card.className = `sticker-card ${card.classList.contains('special') ? 'special' : ''} ${state.status === 'have' ? 'status-have' : 'status-missing'}`;
        
        const badge = card.querySelector('.repeat-count');
        badge.textContent = state.rep;
        if(state.rep > 0) badge.classList.add('show'); else badge.classList.remove('show');

        card.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
        if(state.rep > 0) card.querySelector('.btn-repeat').classList.add('active');
        else if (state.status === 'have') card.querySelector('.btn-have').classList.add('active');
        else card.querySelector('.btn-miss').classList.add('active');
    }

    // Delegação de eventos no grid (Performance)
    grid.addEventListener('click', e => {
        const btn = e.target.closest('.action-btn');
        if(btn) {
            e.stopPropagation();
            toggleSticker(btn.dataset.num, btn.dataset.action);
        }
    });

    // --- ESTATÍSTICAS ---
    let lastPercent = -1;
    function updateStats() {
        let have = 0, rep = 0, spec = 0;
        Object.keys(collection).forEach(k => {
            const st = collection[k];
            if(st.status === 'have') {
                have++;
                rep += st.rep;
                const sData = stickersData.find(x => x.num === k);
                if(sData && sData.tipo === 'Especial') spec++;
            }
        });
        
        let missing = TOTAL_FIGURINHAS - have;
        let pct = ((have / TOTAL_FIGURINHAS) * 100).toFixed(1);

        elStatHave.textContent = have;
        elStatMiss.textContent = missing;
        elStatRep.textContent = rep;
        elStatSpec.textContent = spec;
        
        elProgBar.style.width = pct + '%';
        elProgText.textContent = `${have} de ${TOTAL_FIGURINHAS} (${pct}%)`;

        // Confetti por percentual cheio
        let curFloor = Math.floor(have / 50); // a cada 50
        if(lastPercent !== -1 && curFloor > lastPercent) {
            playTada(); fireConfetti();
        }
        lastPercent = curFloor;
    }
    
    function checkCompletion() {
        // Lógica simples: se completou, solta confete!
        if(Object.keys(collection).filter(k => collection[k].status === 'have').length === TOTAL_FIGURINHAS) {
            playTada();
            fireConfetti(true);
            alert("🏆 PARABÉNS! ÁLBUM COMPLETO! 🏆");
        }
    }

    // --- FILTROS E BUSCA ---
    filterChips.forEach(chip => {
        chip.addEventListener('click', () => {
            filterChips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.dataset.filter;
            renderGrid();
        });
    });

    let searchTimeout;
    searchInput.addEventListener('input', e => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentSearch = e.target.value.trim();
            renderGrid();
        }, 300); // Debounce
    });

    // --- EXTRAS E MODAIS ---
    const modalConfig = document.getElementById('modal-config');
    document.getElementById('btn-menu').addEventListener('click', () => modalConfig.classList.add('active'));
    document.getElementById('btn-close-modal').addEventListener('click', () => modalConfig.classList.remove('active'));

    // Tema
    document.getElementById('btn-theme').addEventListener('click', () => {
        const root = document.documentElement;
        if(root.getAttribute('data-theme') === 'dark') {
            root.setAttribute('data-theme', 'light');
        } else {
            root.setAttribute('data-theme', 'dark');
        }
    });

    // Export/Import
    document.getElementById('btn-export').addEventListener('click', () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(collection));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "album_copa_2026.json");
        dlAnchorElem.click();
        modalConfig.classList.remove('active');
    });

    const fileImport = document.getElementById('file-import');
    document.getElementById('btn-import-trigger').addEventListener('click', () => fileImport.click());
    fileImport.addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                collection = JSON.parse(evt.target.result);
                saveData();
                renderGrid();
                modalConfig.classList.remove('active');
                alert("Coleção importada com sucesso!");
            } catch(err) { alert("Erro ao importar arquivo inválido."); }
        };
        reader.readAsText(file);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if(confirm("Tem certeza? Isso apagará TODO o progresso!")) {
            collection = {};
            saveData();
            renderGrid();
            modalConfig.classList.remove('active');
        }
    });

    // Copiar código-fonte (Self-replication via textarea dummy)
    document.getElementById('btn-copy-code').addEventListener('click', () => {
        const html = document.documentElement.outerHTML;
        navigator.clipboard.writeText(html).then(() => {
            alert('Código copiado para a área de transferência!');
        }).catch(() => alert('Erro ao copiar código.'));
    });

    // Scroll To Top
    const fabTop = document.getElementById('fab-top');
    appScreen.addEventListener('scroll', () => {
        if(appScreen.scrollTop > 300) fabTop.classList.add('visible');
        else fabTop.classList.remove('visible');
    });
    fabTop.addEventListener('click', () => {
        appScreen.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // --- ANIMAÇÕES PARTICULAS (BACKGROUND) ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let parts = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    for(let i=0; i<50; i++) {
        parts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5 });
    }
    function animateParticles() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
        parts.forEach(p => {
            p.x += p.dx; p.y += p.dy;
            if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // --- CONFETTI (MODO CRIANÇA) ---
    const confCanvas = document.getElementById('confetti-canvas');
    const confCtx = confCanvas.getContext('2d');
    let confettis = [];
    let confActive = false;
    function resizeConfCanvas() { confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeConfCanvas);
    resizeConfCanvas();

    function fireConfetti(mega = false) {
        let colors = ['#00ff88', '#ff0055', '#ffd700', '#00aaff', '#ffffff'];
        let count = mega ? 300 : 80;
        for(let i=0; i<count; i++) {
            confettis.push({
                x: Math.random() * confCanvas.width, y: -10 - Math.random() * 200,
                w: Math.random() * 10 + 5, h: Math.random() * 10 + 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                dy: Math.random() * 5 + 2, dx: Math.random() * 4 - 2, rot: Math.random() * 360, dRot: Math.random() * 10 - 5
            });
        }
        if(!confActive) { confActive = true; renderConfetti(); }
        setTimeout(() => { confettis = []; confActive = false; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }, 5000);
    }

    function renderConfetti() {
        if(!confActive) return;
        confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
        confettis.forEach(c => {
            c.y += c.dy; c.x += c.dx; c.rot += c.dRot;
            confCtx.save(); confCtx.translate(c.x, c.y); confCtx.rotate(c.rot * Math.PI / 180);
            confCtx.fillStyle = c.color; confCtx.fillRect(-c.w/2, -c.h/2, c.w, c.h); confCtx.restore();
        });
        requestAnimationFrame(renderConfetti);
    }

</script>
</body>
</html>
